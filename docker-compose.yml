services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ecg-api:
    build: .
    container_name: ecg-api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ollama
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/signals
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
    volumes:
      - ./models:/app/models
      - ./data:/app/data

volumes:
  pgdata:
  ollama_data: